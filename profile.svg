  <circle cx="18" cy="15" r="5" fill="#ff5555"/>
  <circle cx="33" cy="15" r="5" fill="#ffb347"/>
  <circle cx="48" cy="15" r="5" fill="#3fb950"/>
  <text x="340" y="19" text-anchor="middle" fill="#8b949e" font-size="12" font-family="sans-serif">citizenjc@github: ~</text>

  <!-- Prompt: neofetch -->
  <text x="16" y="56">
    <tspan class="p-user">citizenjc</tspan><tspan class="p-at" dx="3">@</tspan><tspan class="p-host" dx="2">github</tspan><tspan class="p-sep" dx="2">:</tspan><tspan class="p-dollar">~$</tspan><tspan class="p-cmd" dx="6">neofetch</tspan>
  </text>

  <text class="label" x="32" y="80">OS</text>
  <text class="value" x="95" y="80">GitHub Profile</text>
  <text class="label" x="32" y="98">Shell</text>
  <text class="value" x="95" y="98">zsh 5.9</text>
  <text class="label" x="32" y="116">Uptime</text>
