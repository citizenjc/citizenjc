    <tspan class="p-user">citizenjc</tspan><tspan class="p-at" dx="3">@</tspan><tspan class="p-host" dx="2">github</tspan><tspan class="p-sep" dx="2">:</tspan><tspan class="p-dollar">~$</tspan><tspan class="p-cmd" dx="6">cat langs.txt</tspan>
