  <rect fill="#777bb4" x="140" y="270" width="36" height="8" rx="4"/>
  <text class="bar-pct" x="350" y="278">7.3%</text>

  <text class="value" x="32" y="296">GDScript</text>
  <rect class="bar-bg" x="140" y="288" width="200" height="8" rx="4"/>
  <rect fill="#478cbf" x="140" y="288" width="36" height="8" rx="4"/>
  <text class="bar-pct" x="350" y="296">7.2%</text>

  <text class="value" x="32" y="314">HTML</text>
  <rect class="bar-bg" x="140" y="306" width="200" height="8" rx="4"/>
  <rect fill="#e34f26" x="140" y="306" width="36" height="8" rx="4"/>
