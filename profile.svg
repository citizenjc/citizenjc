  <text class="label" x="280" y="98">Pulls</text>
  <text class="value" x="360" y="98">331</text>
  <text class="label" x="280" y="116">Issues</text>
  <text class="value" x="360" y="116">2</text>
  <text class="label" x="280" y="134">Contribs</text>
  <text class="value" x="360" y="134">2288 total</text>

  <line class="border" x1="16" y1="155" x2="664" y2="155"/>

  <!-- Prompt: langs -->
