<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" font-family="'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="13">
  <defs>
    <style>
      /* Tokyo Night palette */
      .bg { fill: #1a1b26; }
      .border { fill: none; stroke: #3b4261; stroke-width: 1.5; }
      .title-bg { fill: #1f2335; }
      .title-text { fill: #565f89; font-size: 12px; font-family: sans-serif; font-weight: 600; }
      .surface { fill: #24283b; }
      .blue { fill: #7aa2f7; }
      .green { fill: #9ece6a; }
      .peach { fill: #ff9e64; }
      .pink { fill: #bb9af7; }
      .cyan { fill: #7dcfff; }
      .red { fill: #f7768e; }
      .yellow { fill: #e0af68; }
      .dim { fill: #565f89; }
      .bar-bg { fill: #24283b; }
      .bar-pct { fill: #565f89; }
      .p-user { fill: #7aa2f7; }
      .p-at { fill: #565f89; }
      .p-host { fill: #7aa2f7; }
      .p-dollar { fill: #ff9e64; }
      .p-cmd { fill: #c0caf5; }
      .p-cursor { fill: #c0caf5; animation: blink 1.2s step-end infinite; }
      .label { fill: #9ece6a; }
      .value { fill: #c0caf5; }
      .ach-ok { fill: #9ece6a; }
      .ach-name { fill: #c0caf5; }
      .footer-text { fill: #565f89; font-size: 11px; }
      .window-btn { fill: #3b4261; }
      .star { fill: #c0caf5; }
      .star-dim { fill: #565f89; }
      .moon { fill: #c0caf5; }
      .moon-shadow { fill: #1a1b26; }
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
      @keyframes shooting { 0% { transform: translate(0, 0); opacity: 1; } 70% { opacity: 1; } 100% { transform: translate(-120, 120); opacity: 0; } }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
      @keyframes glow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
  </defs>

  <!-- Night sky background -->
  <rect class="bg" x="0" y="0" width="720" height="620"/>

  <!-- Subtle sky gradient -->
  <rect x="0" y="0" width="720" height="250" fill="url(#skyGrad)" opacity="0.3"/>
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dcfff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a1b26" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Stars -->
  <circle class="star" cx="50" cy="30" r="1.5" style="animation: twinkle 3s ease-in-out infinite"/>
  <circle class="star" cx="120" cy="55" r="1" style="animation: twinkle 4s ease-in-out infinite 0.5s"/>
  <circle class="star-dim" cx="180" cy="20" r="1"/>
  <circle class="star" cx="250" cy="65" r="1" style="animation: twinkle 3.5s ease-in-out infinite 1s"/>
  <circle class="star-dim" cx="310" cy="25" r="1.2"/>
  <circle class="star" cx="380" cy="45" r="1" style="animation: twinkle 2.8s ease-in-out infinite 0.3s"/>
  <circle class="star-dim" cx="440" cy="15" r="0.8"/>
  <circle class="star" cx="500" cy="50" r="1.5" style="animation: twinkle 4.2s ease-in-out infinite 1.5s"/>
  <circle class="star-dim" cx="560" cy="30" r="1"/>
  <circle class="star" cx="620" cy="60" r="1" style="animation: twinkle 3.1s ease-in-out infinite 0.8s"/>
  <circle class="star-dim" cx="660" cy="35" r="1.2"/>
  <circle class="star" cx="690" cy="15" r="1" style="animation: twinkle 3.8s ease-in-out infinite 2s"/>
  <circle class="star-dim" cx="100" cy="80" r="0.8"/>
  <circle class="star" cx="350" cy="85" r="1" style="animation: twinkle 2.5s ease-in-out infinite 0.2s"/>
  <circle class="star-dim" cx="580" cy="75" r="0.9"/>

  <!-- Moon -->
  <g transform="translate(620, 35)" style="animation: float 6s ease-in-out infinite">
    <circle class="moon" r="24"/>
    <circle class="moon-shadow" r="20" cx="7" cy="-5"/>
    <!-- Moon glow -->
    <circle r="30" fill="#c0caf5" opacity="0.06" style="animation: glow 4s ease-in-out infinite"/>
  </g>

  <!-- Shooting star -->
  <g style="animation: shooting 6s ease-in infinite 2s">
    <line x1="580" y1="20" x2="560" y2="40" stroke="#c0caf5" stroke-width="2" stroke-linecap="round" opacity="0"/>
    <line x1="580" y1="20" x2="555" y2="45" stroke="#c0caf5" stroke-width="1" stroke-linecap="round" opacity="0"/>
    <circle cx="560" cy="40" r="1.5" fill="#ffffff" opacity="0"/>
  </g>

  <!-- Second shooting star -->
  <g style="animation: shooting 8s ease-in infinite 6s">
    <line x1="300" y1="10" x2="280" y2="30" stroke="#c0caf5" stroke-width="1.5" stroke-linecap="round" opacity="0"/>
    <circle cx="280" cy="30" r="1" fill="#ffffff" opacity="0"/>
  </g>

  <!-- Drop shadow for terminal -->
  <rect x="14" y="54" width="700" height="560" rx="10" fill="#0f0f18" opacity="0.5"/>

  <!-- Terminal window -->
  <g transform="translate(10, 50)">
    <rect class="bg" x="0" y="0" width="700" height="560" rx="8"/>
    <rect class="border" x="0" y="0" width="700" height="560" rx="8"/>

    <!-- Title bar -->
    <rect class="title-bg" x="1.5" y="1.5" width="697" height="32" rx="6"/>
    <rect class="title-bg" x="1.5" y="20" width="697" height="13.5"/>

    <!-- Window buttons -->
    <circle cx="22" cy="17" r="4.5" class="window-btn"/>
    <circle cx="38" cy="17" r="4.5" class="window-btn" opacity="0.7"/>
    <circle cx="54" cy="17" r="4.5" class="window-btn" opacity="0.4"/>

    <!-- Title with moon emoji -->
    <text x="350" y="21" text-anchor="middle" class="title-text">🌙 zsh — citizenjc@github: ~</text>

    <!-- Terminal content -->
    <g transform="translate(0, 48)">

    <!-- Prompt: neofetch -->
    <text x="24" y="28">
      <tspan class="p-user">citizenjc</tspan><tspan class="p-at">@</tspan><tspan class="p-host">github</tspan><tspan class="p-dollar">:~$</tspan><tspan class="p-cmd" dx="6">neofetch</tspan>
    </text>

    <text class="label" x="40" y="52">OS</text>
    <text class="value" x="103" y="52">GitHub Profile</text>
    <text class="label" x="40" y="70">Shell</text>
    <text class="value" x="103" y="70">zsh 5.9</text>
    <text class="label" x="40" y="88">Uptime</text>
    <text class="value" x="103" y="88">since the dial-up days</text>
    <text class="label" x="40" y="106">TZ</text>
    <text class="value" x="103" y="106">UTC (give or take)</text>

    <text class="label" x="288" y="52">Repos</text>
    <text class="value" x="368" y="52">35</text>
    <text class="label" x="288" y="70">Pulls</text>
    <text class="value" x="368" y="70">331</text>
    <text class="label" x="288" y="88">Issues</text>
    <text class="value" x="368" y="88">2</text>
    <text class="label" x="288" y="106">Contribs</text>
    <text class="value" x="368" y="106">2288 total</text>

    <!-- Separator -->
    <line class="border" x1="24" y1="128" x2="676" y2="128"/>

    <!-- Prompt: langs -->
    <text x="24" y="153">
      <tspan class="p-user">citizenjc</tspan><tspan class="p-at">@</tspan><tspan class="p-host">github</tspan><tspan class="p-dollar">:~$</tspan><tspan class="p-cmd" dx="6">cat langs.txt</tspan>
    </text>

    <text class="value" x="40" y="179">TypeScript</text>
    <rect class="bar-bg" x="148" y="171" width="200" height="8" rx="4"/>
    <rect class="blue" x="148" y="171" width="144" height="8" rx="4"/>
    <text class="bar-pct" x="358" y="179">28.9%</text>

    <text class="value" x="40" y="197">JavaScript</text>
    <rect class="bar-bg" x="148" y="189" width="200" height="8" rx="4"/>
    <rect class="yellow" x="148" y="189" width="119" height="8" rx="4"/>
    <text class="bar-pct" x="358" y="197">23.9%</text>

    <text class="value" x="40" y="215">Python</text>
    <rect class="bar-bg" x="148" y="207" width="200" height="8" rx="4"/>
    <rect class="cyan" x="148" y="207" width="44" height="8" rx="4"/>
    <text class="bar-pct" x="358" y="215">8.8%</text>

    <text class="value" x="40" y="233">CSS</text>
    <rect class="bar-bg" x="148" y="225" width="200" height="8" rx="4"/>
    <rect class="pink" x="148" y="225" width="41" height="8" rx="4"/>
    <text class="bar-pct" x="358" y="233">8.2%</text>

    <text class="value" x="40" y="251">PHP</text>
    <rect class="bar-bg" x="148" y="243" width="200" height="8" rx="4"/>
    <rect class="peach" x="148" y="243" width="36" height="8" rx="4"/>
    <text class="bar-pct" x="358" y="251">7.3%</text>

    <text class="value" x="40" y="269">GDScript</text>
    <rect class="bar-bg" x="148" y="261" width="200" height="8" rx="4"/>
    <rect class="blue" x="148" y="261" width="36" height="8" rx="4" opacity="0.6"/>
    <text class="bar-pct" x="358" y="269">7.2%</text>

    <text class="value" x="40" y="287">HTML</text>
    <rect class="bar-bg" x="148" y="279" width="200" height="8" rx="4"/>
    <rect class="red" x="148" y="279" width="36" height="8" rx="4"/>
    <text class="bar-pct" x="358" y="287">7.3%</text>

    <text class="value" x="40" y="305">Shell</text>
    <rect class="bar-bg" x="148" y="297" width="200" height="8" rx="4"/>
    <rect class="green" x="148" y="297" width="11" height="8" rx="4"/>
    <text class="bar-pct" x="358" y="305">2.2%</text>

    <text class="value" x="40" y="323">Java</text>
    <rect class="bar-bg" x="148" y="315" width="200" height="8" rx="4"/>
    <rect class="peach" x="148" y="315" width="7" height="8" rx="4" opacity="0.6"/>
    <text class="bar-pct" x="358" y="323">1.4%</text>

    <text class="value" x="40" y="341">Astro</text>
    <rect class="bar-bg" x="148" y="333" width="200" height="8" rx="4"/>
    <rect class="peach" x="148" y="333" width="5" height="8" rx="4" opacity="0.4"/>
    <text class="bar-pct" x="358" y="341">1.0%</text>

    <!-- Separator -->
    <line class="border" x1="24" y1="358" x2="676" y2="358"/>

    <!-- Prompt: achievements -->
    <text x="24" y="383">
      <tspan class="p-user">citizenjc</tspan><tspan class="p-at">@</tspan><tspan class="p-host">github</tspan><tspan class="p-dollar">:~$</tspan><tspan class="p-cmd" dx="6">cat achievements.log</tspan>
    </text>

    <text class="ach-ok" x="40" y="407">[ok]</text>
    <text class="ach-name" x="78" y="407">Pair Extraordinaire  x4</text>
    <text class="ach-ok" x="40" y="425">[ok]</text>
    <text class="ach-name" x="78" y="425">Pull Shark           x3</text>
    <text class="ach-ok" x="40" y="443">[ok]</text>
    <text class="ach-name" x="78" y="443">YOLO</text>
    <text class="ach-ok" x="40" y="461">[ok]</text>
    <text class="ach-name" x="78" y="461">Quickdraw</text>

    <!-- Final prompt + cursor -->
    <text x="24" y="489">
      <tspan class="p-user">citizenjc</tspan><tspan class="p-at">@</tspan><tspan class="p-host">github</tspan><tspan class="p-dollar">:~$</tspan><tspan class="p-cursor" dx="2">&#9608;</tspan>
    </text>

    <!-- Status line -->
    <rect class="surface" x="24" y="508" width="652" height="22" rx="4"/>
    <text class="footer-text" x="34" y="523">citizenjc@github</text>
    <text class="footer-text" x="350" y="523" text-anchor="middle">profile data from github api</text>
    <text class="footer-text" x="666" y="523" text-anchor="end">2026-07-21</text>

    </g>
  </g>
</svg>
