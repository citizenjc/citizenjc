<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" font-family="'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="13">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .border { fill: none; stroke: #30363d; stroke-width: 1; }
      .label { fill: #79c0ff; }
      .value { fill: #e6edf3; }
      .bar-bg { fill: #21262d; }
      .bar-pct { fill: #8b949e; }
      .ach-ok { fill: #3fb950; }
      .ach-name { fill: #e6edf3; }
      .footer { fill: #8b949e; font-size: 11px; }
      .p-user { fill: #58a6ff; }
      .p-at { fill: #8b949e; }
      .p-host { fill: #58a6ff; }
      .p-sep { fill: #8b949e; }
      .p-dollar { fill: #f0883e; }
      .p-cmd { fill: #e6edf3; }
      .p-cursor { fill: #e6edf3; animation: blink 1.2s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="680" height="580" rx="6"/>

  <rect fill="#21262d" x="0" y="0" width="680" height="30" rx="6"/>
