<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" font-family="'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="13">
  <defs>
    <style>
      /* Catppuccin Mocha palette */
      .bg { fill: #1e1e2e; }
      .surface { fill: #313244; }
      .accent { fill: #cba6f7; }
      .text { fill: #cdd6f4; }
      .subtext { fill: #a6adc8; }
      .blue { fill: #89b4fa; }
      .green { fill: #a6e3a1; }
      .peach { fill: #fab387; }
      .mauve { fill: #cba6f7; }
      .teal { fill: #94e2d5; }
      .red { fill: #f38ba8; }
      .yellow { fill: #f9e2af; }
      .border { fill: none; stroke: #45475a; stroke-width: 1; }
      .bar-bg { fill: #313244; }
      .bar-pct { fill: #a6adc8; }
      .p-user { fill: #89b4fa; }
      .p-at { fill: #a6adc8; }
      .p-host { fill: #89b4fa; }
      .p-dollar { fill: #fab387; }
      .p-cmd { fill: #cdd6f4; }
      .p-cursor { fill: #cdd6f4; animation: blink 1.2s step-end infinite; }
      .label { fill: #a6e3a1; }
      .value { fill: #cdd6f4; }
      .ach-ok { fill: #a6e3a1; }
      .ach-name { fill: #cdd6f4; }
      .footer { fill: #585b70; font-size: 11px; }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </defs>

  <!-- Terminal body -->
  <rect class="bg" x="0" y="0" width="680" height="580" rx="8"/>

  <!-- Thin accent top bar -->
  <rect class="mauve" x="0" y="0" width="680" height="3" rx="1.5"/>

  <!-- Terminal content area -->
  <g transform="translate(0, 20)">

  <!-- Prompt: neofetch -->
  <text x="16" y="36">
    <tspan class="p-user">citizenjc</tspan><tspan class="p-at">@</tspan><tspan class="p-host">github</tspan><tspan class="p-dollar">:~$</tspan><tspan class="p-cmd" dx="6">neofetch</tspan>
  </text>

  <text class="label" x="32" y="60">OS</text>
  <text class="value" x="95" y="60">GitHub Profile</text>
  <text class="label" x="32" y="78">Shell</text>
  <text class="value" x="95" y="78">zsh 5.9</text>
  <text class="label" x="32" y="96">Uptime</text>
  <text class="value" x="95" y="96">since the dial-up days</text>
  <text class="label" x="32" y="114">TZ</text>
  <text class="value" x="95" y="114">UTC (give or take)</text>

  <text class="label" x="280" y="60">Repos</text>
  <text class="value" x="360" y="60">35</text>
  <text class="label" x="280" y="78">Pulls</text>
  <text class="value" x="360" y="78">331</text>
  <text class="label" x="280" y="96">Issues</text>
  <text class="value" x="360" y="96">2</text>
  <text class="label" x="280" y="114">Contribs</text>
  <text class="value" x="360" y="114">2288 total</text>

  <!-- Separator -->
  <line class="border" x1="16" y1="135" x2="664" y2="135"/>

  <!-- Prompt: langs -->
  <text x="16" y="160">
    <tspan class="p-user">citizenjc</tspan><tspan class="p-at">@</tspan><tspan class="p-host">github</tspan><tspan class="p-dollar">:~$</tspan><tspan class="p-cmd" dx="6">cat langs.txt</tspan>
  </text>

  <text class="value" x="32" y="186">TypeScript</text>
  <rect class="bar-bg" x="140" y="178" width="200" height="8" rx="4"/>
  <rect class="blue" x="140" y="178" width="144" height="8" rx="4"/>
  <text class="bar-pct" x="350" y="186">28.9%</text>

  <text class="value" x="32" y="204">JavaScript</text>
  <rect class="bar-bg" x="140" y="196" width="200" height="8" rx="4"/>
  <rect class="yellow" x="140" y="196" width="119" height="8" rx="4"/>
  <text class="bar-pct" x="350" y="204">23.9%</text>

  <text class="value" x="32" y="222">Python</text>
  <rect class="bar-bg" x="140" y="214" width="200" height="8" rx="4"/>
  <rect class="teal" x="140" y="214" width="44" height="8" rx="4"/>
  <text class="bar-pct" x="350" y="222">8.8%</text>

  <text class="value" x="32" y="240">CSS</text>
  <rect class="bar-bg" x="140" y="232" width="200" height="8" rx="4"/>
  <rect class="mauve" x="140" y="232" width="41" height="8" rx="4"/>
  <text class="bar-pct" x="350" y="240">8.2%</text>

  <text class="value" x="32" y="258">PHP</text>
  <rect class="bar-bg" x="140" y="250" width="200" height="8" rx="4"/>
  <rect class="peach" x="140" y="250" width="36" height="8" rx="4"/>
  <text class="bar-pct" x="350" y="258">7.3%</text>

  <text class="value" x="32" y="276">GDScript</text>
  <rect class="bar-bg" x="140" y="268" width="200" height="8" rx="4"/>
  <rect class="blue" x="140" y="268" width="36" height="8" rx="4" opacity="0.7"/>
  <text class="bar-pct" x="350" y="276">7.2%</text>

  <text class="value" x="32" y="294">HTML</text>
  <rect class="bar-bg" x="140" y="286" width="200" height="8" rx="4"/>
  <rect class="red" x="140" y="286" width="36" height="8" rx="4"/>
  <text class="bar-pct" x="350" y="294">7.3%</text>

  <text class="value" x="32" y="312">Shell</text>
  <rect class="bar-bg" x="140" y="304" width="200" height="8" rx="4"/>
  <rect class="green" x="140" y="304" width="11" height="8" rx="4"/>
  <text class="bar-pct" x="350" y="312">2.2%</text>

  <text class="value" x="32" y="330">Java</text>
  <rect class="bar-bg" x="140" y="322" width="200" height="8" rx="4"/>
  <rect class="peach" x="140" y="322" width="7" height="8" rx="4" opacity="0.6"/>
  <text class="bar-pct" x="350" y="330">1.4%</text>

  <text class="value" x="32" y="348">Astro</text>
  <rect class="bar-bg" x="140" y="340" width="200" height="8" rx="4"/>
  <rect class="peach" x="140" y="340" width="5" height="8" rx="4" opacity="0.4"/>
  <text class="bar-pct" x="350" y="348">1.0%</text>

  <!-- Separator -->
  <line class="border" x1="16" y1="365" x2="664" y2="365"/>

  <!-- Prompt: achievements -->
  <text x="16" y="390">
    <tspan class="p-user">citizenjc</tspan><tspan class="p-at">@</tspan><tspan class="p-host">github</tspan><tspan class="p-dollar">:~$</tspan><tspan class="p-cmd" dx="6">cat achievements.log</tspan>
  </text>

  <text class="ach-ok" x="32" y="414">[ok]</text>
  <text class="ach-name" x="70" y="414">Pair Extraordinaire  x4</text>
  <text class="ach-ok" x="32" y="432">[ok]</text>
  <text class="ach-name" x="70" y="432">Pull Shark           x3</text>
  <text class="ach-ok" x="32" y="450">[ok]</text>
  <text class="ach-name" x="70" y="450">YOLO</text>
  <text class="ach-ok" x="32" y="468">[ok]</text>
  <text class="ach-name" x="70" y="468">Quickdraw</text>

  <!-- Final prompt + cursor -->
  <text x="16" y="496">
    <tspan class="p-user">citizenjc</tspan><tspan class="p-at">@</tspan><tspan class="p-host">github</tspan><tspan class="p-dollar">:~$</tspan><tspan class="p-cursor" dx="2">&#9608;</tspan>
  </text>

  <!-- tmux-style status line -->
  <rect class="surface" x="16" y="515" width="648" height="22" rx="4"/>
  <text class="footer" x="26" y="530">citizenjc@github</text>
  <text class="footer" x="340" y="530" text-anchor="middle">profile data from github api</text>
  <text class="footer" x="656" y="530" text-anchor="end">2026-07-21</text>

  </g>
</svg>
